<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Opportunity Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.97 0.012 85);
    --surface: oklch(0.94 0.018 85);
    --surface-2: oklch(0.92 0.022 85);
    --line: oklch(0.86 0.02 85);
    --ink: oklch(0.18 0.008 60);
    --ink-2: oklch(0.32 0.01 60);
    --muted: oklch(0.55 0.012 60);
    --accent: oklch(0.40 0.13 25);
    --accent-soft: oklch(0.92 0.04 25);
    --good: oklch(0.45 0.09 145);
    --serif: "Source Serif 4", Georgia, serif;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  .num { font-family: var(--serif); font-feature-settings: "tnum" 1, "lnum" 1; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; color: inherit; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="defaults">
{
  "annualSalary": 287500,
  "rangeLowPct": 0.887,
  "rangeHighPct": 1.113,
  "weeklyHours": 40,
  "weeksPerYear": 50,
  "workdayHours": 8,
  "daysUnemployed": 0,
  "currency": "USD",
  "openedAt": null
}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>Opportunity Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.993 0.003 85);
    --surface: oklch(0.970 0.008 85);
    --surface-2: oklch(0.950 0.012 85);
    --line: oklch(0.918 0.010 85);
    --ink: oklch(0.16 0.006 60);
    --ink-2: oklch(0.38 0.010 60);
    --muted: oklch(0.58 0.010 60);
    --accent: oklch(0.40 0.13 25);
    --accent-soft: oklch(0.963 0.022 25);
    --accent-line: oklch(0.895 0.042 25);
    --ticker-pad-x: 28px;
    --breakdown-card: oklch(0.998 0.002 85);
    --breakdown-border: oklch(0.952 0.008 85);
    --serif: "Source Serif 4", Georgia, serif;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
    --hand: "Kalam", "Segoe Print", "Bradley Hand", cursive;
    --radius-card: 20px;
    --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
    --float-w: 220px;
    --float-h: 72px;
    color-scheme: light;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: oklch(0.17 0.012 280);
      --surface: oklch(0.22 0.014 280);
      --surface-2: oklch(0.27 0.014 280);
      --line: oklch(0.34 0.012 280);
      --ink: oklch(0.93 0.012 85);
      --ink-2: oklch(0.78 0.012 85);
      --muted: oklch(0.58 0.014 85);
      --accent: oklch(0.72 0.14 25);
      --accent-soft: oklch(0.24 0.04 25);
      --accent-line: oklch(0.38 0.06 25);
      --breakdown-card: oklch(0.20 0.012 280);
      --breakdown-border: oklch(0.30 0.012 280);
      --shadow-card: 0 1px 3px rgba(0,0,0,.35), 0 4px 24px rgba(0,0,0,.25);
      color-scheme: dark;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input  { font-family: inherit; color: inherit; }

  /* ── Page ── */
  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 48px;
  }

  .shell {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Hero headline ── */
  .hero {
    text-align: center;
    padding: 0 8px 4px;
    margin-bottom: 8px;
  }

  .hero-hed {
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 300;
    line-height: 1.18;
    letter-spacing: -0.5px;
    color: var(--ink);
    margin-bottom: 14px;
    white-space: nowrap;
  }

  .hero-hed em {
    font-style: italic;
    font-weight: 400;
  }

  .hero-blurb {
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
    max-width: 420px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* ── Input card ── */
  .input-card {
    background: var(--surface);
    border-radius: var(--radius-card);
    padding: 22px 26px 20px;
    box-shadow: var(--shadow-card);
    position: relative;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 10px;
    display: block;
  }

  .input-row {
    display: flex;
    align-items: center;
  }

  .input-symbol {
    font-family: var(--serif);
    font-size: 46px;
    font-weight: 400;
    color: var(--ink-2);
    line-height: 1;
    user-select: none;
    flex-shrink: 0;
    margin-right: 3px;
  }

  .salary-input {
    font-family: var(--serif);
    font-size: 46px;
    font-weight: 400;
    background: transparent;
    border: none;
    outline: none;
    flex: 1;
    min-width: 0;
    color: var(--ink);
    padding: 0;
    letter-spacing: -1.5px;
    line-height: 1;
    font-feature-settings: "tnum" 1, "lnum" 1;
  }

  /* ── Edit icon ── */
  .edit-btn {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    color: var(--muted);
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .edit-btn.visible { display: flex; }
  .edit-btn:hover { background: var(--surface-2); color: var(--ink-2); }

  /* ── Start button ── */
  .start-row {
    margin-top: 14px;
    display: flex;
    justify-content: flex-end;
  }
  .start-row.hidden { display: none; }

  .start-btn {
    background: var(--ink);
    color: var(--bg);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.1px;
    transition: opacity 0.15s;
  }
  .start-btn:hover  { opacity: 0.82; }
  .start-btn:disabled { opacity: 0.28; cursor: default; }

  /* ── Results ── */
  .results {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .results.hidden { display: none; }

  /* ── Ticker ── */
  .ticker-card {
    background: var(--accent-soft);
    border: 1px solid var(--accent-line);
    border-radius: var(--radius-card);
    padding: 24px var(--ticker-pad-x);
    box-shadow: var(--shadow-card);
  }

  .ticker-eyebrow {
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    opacity: 0.7;
    margin-bottom: 8px;
  }

  .ticker-num {
    font-family: var(--serif);
    font-size: 52px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: -2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "lnum" 1;
  }

  /* ── Breakdown (inline toggle + grid; inset matches .ticker-card) ── */
  .breakdown-block {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0 var(--ticker-pad-x);
  }

  .breakdown-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0 14px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;
    background: none;
    border: none;
    text-align: left;
  }
  .breakdown-toggle:hover { color: var(--ink-2); }

  .breakdown-caret {
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 10px;
  }
  .breakdown-toggle.open .breakdown-caret { transform: rotate(180deg); }

  /* ── Breakdown grid ── */
  .grid {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--breakdown-border);
    border: 1px solid var(--breakdown-border);
    border-radius: 12px;
    overflow: hidden;
  }
  .grid.open { display: grid; }

  .card {
    background: var(--breakdown-card);
    padding: 14px 18px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .card-val {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.3px;
    line-height: 1.05;
    font-feature-settings: "tnum" 1, "lnum" 1;
  }

  /* ── Pin button ── */
  .pin-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 34px;
    height: 34px;
    z-index: 50;
    border-radius: 50%;
    background: var(--surface);
    box-shadow: var(--shadow-card);
    color: var(--ink-2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s, opacity 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .pin-btn.visible { opacity: 1; pointer-events: auto; }
  .pin-btn.active  { background: var(--ink); color: var(--bg); }

  /* ── Pin hint (plain text left of pop-out; no chrome) ── */
  .pin-hint[hidden] {
    display: none !important;
  }
  .pin-hint {
    position: fixed;
    top: 22px;
    right: 52px;
    z-index: 60;
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    gap: 4px;
    max-width: min(200px, calc(100vw - 64px));
    font-family: var(--hand);
    font-size: 14px;
    font-weight: 400;
    line-height: 1;
    color: #000;
    cursor: default;
    user-select: none;
    background: none;
    border: none;
    padding: 4px 0;
    text-align: right;
  }
  @media (prefers-color-scheme: dark) {
    .pin-hint { color: #f2f2f2; }
  }
  .pin-hint-text { white-space: nowrap; }
  .pin-hint-arrow {
    flex-shrink: 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    opacity: 0.95;
  }

  /* ── Floating window (fixed size, tracker only) ── */
  .float-win {
    position: fixed;
    left: 24px;
    top: 24px;
    width: var(--float-w);
    height: var(--float-h);
    z-index: 9999;
    background: var(--bg);
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.06);
    overflow: hidden;
    display: none;
    cursor: grab;
    box-sizing: border-box;
    user-select: none;
  }
  .float-win:active { cursor: grabbing; }
  @media (prefers-color-scheme: dark) {
    .float-win {
      box-shadow: 0 8px 40px rgba(0,0,0,.55), 0 2px 12px rgba(0,0,0,.35);
    }
  }
  .float-win.open { display: block; }

  .float-close-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    z-index: 2;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    pointer-events: auto;
    transition: background 0.12s, color 0.12s;
  }
  .float-close-btn:hover { background: var(--surface-2); color: var(--ink-2); }
  .float-body {
    height: 100%;
    width: 100%;
    padding: 8px 28px 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 2px;
    pointer-events: none;
  }
  .float-label {
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .float-num {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: -0.8px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "lnum" 1;
  }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .page {
      align-items: flex-start;
      padding-top: 56px;
      padding-bottom: 20px;
    }
    .shell {
      gap: 16px;
    }
    .hero {
      min-height: 140px;
      margin-bottom: 4px;
    }
    .hero-hed {
      font-size: 32px;
      white-space: normal;
    }
    .hero-blurb {
      font-size: 13px;
      min-height: 64px;
    }
    .ticker-num { font-size: 40px; }
    .salary-input, .input-symbol { font-size: 36px; }
    .pin-btn { display: none !important; }
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="shell">

    <!-- Pin button -->
    <button class="pin-btn" id="pinBtn" title="Pin to desktop" aria-label="Pin to desktop">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2.5" y="4" width="19" height="16" rx="2"/>
        <rect x="12.5" y="12" width="7" height="6" rx="1" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <div class="pin-hint" id="pinHint" role="status" aria-live="polite" hidden>
      <span class="pin-hint-text">Keep on screen</span>
      <span class="pin-hint-arrow" aria-hidden="true">-&gt;</span>
    </div>

    <!-- Hero -->
    <div class="hero">
      <h1 class="hero-hed">Every minute you wait <em>costs money.</em></h1>
      <p class="hero-blurb" id="heroBlurb">Add the total comp you could be earning below and see how much your procrastination is costing you.</p>
    </div>

    <!-- Input card -->
    <section class="input-card" id="inputCard">
      <label class="field-label" for="salaryInput">Your income</label>

      <button class="edit-btn" id="editBtn" title="Edit salary" aria-label="Edit salary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>

      <div class="input-row">
        <span class="input-symbol">$</span>
        <input
          id="salaryInput"
          class="salary-input"
          type="text"
          inputmode="numeric"
          placeholder="100,000"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="start-row" id="startRow">
        <button class="start-btn" id="startBtn" disabled>
          Calculate
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Results -->
    <div class="results hidden" id="results">

      <!-- Ticker -->
      <div class="ticker-card">
        <div class="ticker-eyebrow">What you could've made</div>
        <div class="ticker-num" id="tickerMain">—</div>
      </div>

      <!-- Breakdown -->
      <div class="breakdown-block">
        <button type="button" class="breakdown-toggle" id="breakdownToggle" aria-expanded="false">
          <span>Breakdown</span>
          <svg class="breakdown-caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>
        <div class="grid" id="breakdownGrid">
          <div class="card"><div class="card-label">Per year</div><div class="card-val" id="cYear">—</div></div>
          <div class="card"><div class="card-label">Per month</div><div class="card-val" id="cMonth">—</div></div>
          <div class="card"><div class="card-label">Per week</div><div class="card-val" id="cWeek">—</div></div>
          <div class="card"><div class="card-label">Per day</div><div class="card-val" id="cDay">—</div></div>
          <div class="card"><div class="card-label">Per hour</div><div class="card-val" id="cHour">—</div></div>
          <div class="card"><div class="card-label">Per minute</div><div class="card-val" id="cMin">—</div></div>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- Floating fallback window (fixed size; drag to move) -->
<div class="float-win" id="floatWin">
  <button type="button" class="float-close-btn" id="floatClose" aria-label="Close">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>
  <div class="float-body">
    <div class="float-label">What you could've made so far:</div>
    <div class="float-num" id="tickerFloat">—</div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'opportunity-tracker-v3';
  const PIN_HINT_SESSION_KEY = 'ot-pin-hint-dismissed';
  const FLOAT_W = 220;
  const FLOAT_H = 72;

  let salary    = 0;
  let started   = false;
  let startedAt = null;
  let derived   = {};

  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (s.salary && isFinite(s.salary)) salary = s.salary;
  } catch (_) {}

  function compute(annual) {
    const totalHrs = 40 * 50;
    const perHour  = totalHrs ? annual / totalHrs : 0;
    const perMin   = perHour / 60;
    const perSec   = perMin  / 60;
    return { annual, perHour, perMin, perSec,
             perDay: perHour * 8, perWeek: perHour * 8 * 5, perMonth: annual / 12 };
  }

  function fmt(n, dec = 0) {
    if (!isFinite(n)) return '$0';
    const s = n.toFixed(dec);
    const [i, d] = s.split('.');
    const c = i.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return '$' + (d ? c + '.' + d : c);
  }

  function parseSalary(str) {
    const c = str.replace(/[^\d.kKmM]/g, '');
    if (!c) return 0;
    const m = /k$/i.test(c) ? 1e3 : /m$/i.test(c) ? 1e6 : 1;
    return (parseFloat(m > 1 ? c.slice(0, -1) : c) || 0) * m;
  }

  function formatSalaryInput(str) {
    const clean = str.replace(/,/g, '').replace(/[^\d.kKmM]/g, '');
    if (!clean) return '';
    if (/[kKmM]$/.test(clean)) return clean;

    const [intPartRaw, decPartRaw = ''] = clean.split('.');
    const intPart = (intPartRaw || '').replace(/\D/g, '');
    const decPart = decPartRaw.replace(/\D/g, '');
    const grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    if (clean.includes('.')) return `${grouped || '0'}.${decPart}`;
    return grouped;
  }

  const salaryInput     = document.getElementById('salaryInput');
  const startRow        = document.getElementById('startRow');
  const startBtn        = document.getElementById('startBtn');
  const editBtn         = document.getElementById('editBtn');
  const results         = document.getElementById('results');
  const breakdownToggle = document.getElementById('breakdownToggle');
  const breakdownGrid   = document.getElementById('breakdownGrid');
  const cYear  = document.getElementById('cYear');
  const cMonth = document.getElementById('cMonth');
  const cWeek  = document.getElementById('cWeek');
  const cDay   = document.getElementById('cDay');
  const cHour  = document.getElementById('cHour');
  const cMin   = document.getElementById('cMin');
  const tickerMain  = document.getElementById('tickerMain');
  const pinBtn      = document.getElementById('pinBtn');
  const pinHint     = document.getElementById('pinHint');
  const floatWin    = document.getElementById('floatWin');
  const floatClose  = document.getElementById('floatClose');
  const tickerFloat = document.getElementById('tickerFloat');

  let pinHintRevealTimer = null;

  function clearPinHintRevealTimer() {
    if (pinHintRevealTimer) {
      clearTimeout(pinHintRevealTimer);
      pinHintRevealTimer = null;
    }
  }

  function pinHintDelayElapsed() {
    return !!(startedAt && Date.now() - startedAt >= 2000);
  }

  function schedulePinHintReveal() {
    clearPinHintRevealTimer();
    if (!pinHint) return;
    pinHint.hidden = true;
    if (!started || !startedAt || isMobileView() || sessionStorage.getItem(PIN_HINT_SESSION_KEY)) return;
    const wait = Math.max(0, 2000 - (Date.now() - startedAt));
    pinHintRevealTimer = setTimeout(() => {
      pinHintRevealTimer = null;
      syncPinHintVisibility();
    }, wait);
  }

  function syncPinHintVisibility() {
    if (!pinHint) return;
    const dismissed = sessionStorage.getItem(PIN_HINT_SESSION_KEY);
    const base = started && !isMobileView() && pinBtn.classList.contains('visible') && !dismissed;
    pinHint.hidden = !(base && pinHintDelayElapsed());
  }

  function dismissPinHint() {
    clearPinHintRevealTimer();
    sessionStorage.setItem(PIN_HINT_SESSION_KEY, '1');
    syncPinHintVisibility();
  }

  if (salary > 0) { salaryInput.value = salary.toLocaleString('en-US'); startBtn.disabled = false; }

  function updateCards() {
    derived = compute(salary);
    cYear.textContent  = fmt(derived.annual);
    cMonth.textContent = fmt(derived.perMonth);
    cWeek.textContent  = fmt(derived.perWeek);
    cDay.textContent   = fmt(derived.perDay);
    cHour.textContent  = fmt(derived.perHour);
    cMin.textContent   = fmt(derived.perMin, 2);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ salary })); } catch (_) {}
  }

  salaryInput.addEventListener('focus', () => {
    salaryInput.value = salary > 0 ? String(salary) : '';
    lockMobileScrollOnFocus();
  });
  salaryInput.addEventListener('input', () => {
    const cursorFromEnd = salaryInput.value.length - salaryInput.selectionStart;
    const formatted = formatSalaryInput(salaryInput.value);
    salaryInput.value = formatted;
    const nextCursor = Math.max(0, formatted.length - cursorFromEnd);
    salaryInput.setSelectionRange(nextCursor, nextCursor);

    salary = parseSalary(formatted);
    startBtn.disabled = salary <= 0;
    if (started) updateCards();
  });
  salaryInput.addEventListener('blur', () => {
    salaryInput.value = salary > 0 ? salary.toLocaleString('en-US') : '';
    mobileFocusScrollY = null;
  });

  const heroBlurb = document.getElementById('heroBlurb');

  startBtn.addEventListener('click', () => {
    if (salary <= 0) return;
    started = true; startedAt = Date.now();
    updateCards();
    results.classList.remove('hidden');
    startRow.classList.add('hidden');
    editBtn.classList.add('visible');
    pinBtn.classList.toggle('visible', !isMobileView());
    schedulePinHintReveal();
  });

  editBtn.addEventListener('click', () => {
    startRow.classList.remove('hidden');
    editBtn.classList.remove('visible');
    salaryInput.focus(); salaryInput.select();
    syncPinHintVisibility();
  });

  /* breakdown expand/collapse */
  breakdownToggle.addEventListener('click', () => {
    const open = breakdownGrid.classList.toggle('open');
    breakdownToggle.classList.toggle('open', open);
    breakdownToggle.setAttribute('aria-expanded', open);
  });

  /* ticker */
  let pipTickerEl = null;
  function tick() {
    if (started && startedAt) {
      const text = fmt(((Date.now() - startedAt) / 1000) * derived.perSec, 3);
      tickerMain.textContent = text;
      if (floatOpen)   tickerFloat.textContent = text;
      if (pipTickerEl) pipTickerEl.textContent = text;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* compact / PiP */
  let floatOpen = false, pipOpen = false, pipWin = null;
  const supportsDocPiP = 'documentPictureInPicture' in window;
  const mobileQuery = window.matchMedia('(max-width: 640px)');
  let mobileFocusScrollY = null;

  function isMobileView() {
    return mobileQuery.matches;
  }

  function lockMobileScrollOnFocus() {
    if (!isMobileView()) return;
    mobileFocusScrollY = window.scrollY;
    requestAnimationFrame(() => window.scrollTo(0, mobileFocusScrollY));
    setTimeout(() => {
      if (mobileFocusScrollY !== null) window.scrollTo(0, mobileFocusScrollY);
    }, 140);
  }

  function pipCompactCss(isDark) {
    const shell =
      '*{box-sizing:border-box;margin:0}' +
      `html,body{width:${FLOAT_W}px;height:${FLOAT_H}px;overflow:hidden;font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased}` +
      `body{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:8px 28px 8px 12px;gap:2px}` +
      `#pl{font-size:9px;letter-spacing:0.8px;text-transform:uppercase;font-weight:500;white-space:nowrap}` +
      `#pt{font-family:"Source Serif 4",Georgia,serif;font-size:26px;font-weight:400;letter-spacing:-0.8px;line-height:1;font-variant-numeric:tabular-nums}`;
    if (isDark) {
      return shell + `html,body{background:oklch(0.17 0.012 280);color-scheme:dark}#pl{color:oklch(0.58 0.014 85)}#pt{color:oklch(0.72 0.14 25)}`;
    }
    return shell + `html,body{background:oklch(0.993 0.003 85);color-scheme:light}#pl{color:oklch(0.58 0.010 60)}#pt{color:oklch(0.40 0.13 25)}`;
  }

  async function openCompact() {
    if (isMobileView()) return;
    if (supportsDocPiP) {
      try {
        const pipDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        pipWin = await window.documentPictureInPicture.requestWindow({
          width: FLOAT_W,
          height: FLOAT_H,
        });
        document.querySelectorAll('link[rel="stylesheet"]').forEach(n => pipWin.document.head.appendChild(n.cloneNode(true)));
        const st = pipWin.document.createElement('style');
        st.textContent = pipCompactCss(pipDark);
        pipWin.document.head.appendChild(st);
        const lbl = pipWin.document.createElement('div');
        lbl.id = 'pl';
        lbl.textContent = "What you could've made so far:";
        pipWin.document.body.appendChild(lbl);
        const wrap = pipWin.document.createElement('div');
        wrap.id = 'pt';
        wrap.textContent = '—';
        pipWin.document.body.appendChild(wrap);
        pipTickerEl = wrap;
        pipOpen = true;
        pinBtn.classList.add('active');
        dismissPinHint();
        pipWin.addEventListener('pagehide', () => { pipOpen = false; pipTickerEl = null; pipWin = null; pinBtn.classList.remove('active'); });
        return;
      } catch (_) {}
    }
    floatOpen = true;
    floatWin.classList.add('open');
    floatWin.style.left = '24px';
    floatWin.style.top = '24px';
    pinBtn.classList.add('active');
    dismissPinHint();
  }

  function closeCompact() {
    if (pipWin) { try { pipWin.close(); } catch (_) {} }
    pipOpen = false; floatOpen = false;
    floatWin.classList.remove('open'); pinBtn.classList.remove('active');
    sessionStorage.removeItem(PIN_HINT_SESSION_KEY);
    syncPinHintVisibility();
  }

  mobileQuery.addEventListener('change', (e) => {
    if (e.matches) {
      closeCompact();
      clearPinHintRevealTimer();
    }
    pinBtn.classList.toggle('visible', started && !e.matches);
    if (!e.matches && started && !sessionStorage.getItem(PIN_HINT_SESSION_KEY)) {
      schedulePinHintReveal();
    } else {
      syncPinHintVisibility();
    }
  });

  pinBtn.addEventListener('click', () => {
    if (isMobileView()) return;
    (pipOpen || floatOpen) ? closeCompact() : openCompact();
  });
  floatClose.addEventListener('click', closeCompact);

  floatWin.addEventListener('mousedown', (e) => {
    if (e.target.closest('#floatClose')) return;
    const sx = e.clientX, sy = e.clientY;
    const ox = parseInt(floatWin.style.left, 10) || 24;
    const oy = parseInt(floatWin.style.top,  10) || 24;
    const onMove = (ev) => {
      floatWin.style.left = Math.max(8, Math.min(window.innerWidth - FLOAT_W - 8, ox + ev.clientX - sx)) + 'px';
      floatWin.style.top  = Math.max(8, Math.min(window.innerHeight - FLOAT_H - 8, oy + ev.clientY - sy)) + 'px';
    };
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
  });

  syncPinHintVisibility();
</script>
</body>
</html>
